name: 'Grain composite probe'

# Path-filtered probe that catches the upside-down / decode-race class of bugs
# in the grain composite path. Runs on push/PR touching the granulator
# worklet, grain buffer, grain composite shader, or the probe itself.

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'public/worklets/granulator.js'
      - 'src/video/grain-buffer.ts'
      - 'src/video/grain-composite.frag'
      - 'src/video/grain-composite.vert'
      - 'src/video/grain-composite.ts'
      - 'qa/e2e/grain-composite-probe.spec.ts'
      - 'qa/playwright.config.ts'
      - '.github/workflows/grain-composite.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'public/worklets/granulator.js'
      - 'src/video/grain-buffer.ts'
      - 'src/video/grain-composite.frag'
      - 'src/video/grain-composite.vert'
      - 'src/video/grain-composite.ts'
      - 'qa/e2e/grain-composite-probe.spec.ts'
      - 'qa/playwright.config.ts'
      - '.github/workflows/grain-composite.yml'

jobs:
  composite-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run grain composite probe
        env:
          PLAYWRIGHT_SERVER_MODE: preview
          CI: 'true'
        run: npm run qa:grainComposite

      - name: Copy probe images to artifact directory
        if: ${{ !cancelled() }}
        run: |
          mkdir -p qa/results/probes
          find /tmp -maxdepth 1 -name 'grain-composite-*.png' -exec cp {} qa/results/probes/ \; || true

      - name: Upload probe artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: grain-composite-probe
          path: |
            qa/results/playwright/**
            qa/results/probes/**
          retention-days: 14
